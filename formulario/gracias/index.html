<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva recibida — Inizio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #222;
            border: 1px solid #333;
            border-radius: 4px;
            max-width: 520px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }
        .check {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        h1 {
            font-family: Georgia, serif;
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #f5f0e8;
        }
        p {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 10px;
        }
        .highlight {
            color: #f5f0e8;
            font-weight: 600;
        }
        .divider {
            border: none;
            border-top: 1px solid #333;
            margin: 28px 0;
        }
        .whatsapp {
            display: inline-block;
            margin-top: 8px;
            padding: 12px 24px;
            background: #25D366;
            color: #fff;
            text-decoration: none;
            border-radius: 2px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .back {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back:hover { color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="check">✓</div>
        <h1>Reserva recibida</h1>
        <p>Gracias. Rodny te confirmará la plaza <span class="highlight">en menos de 24 horas</span> por WhatsApp.</p>
        <p>Cuando el grupo esté completo te añadiremos al grupo privado del taller.</p>
        <hr class="divider">
        <p>¿Tienes alguna pregunta urgente?</p>
        <a class="whatsapp" href="https://wa.me/34614364778">Escríbenos por WhatsApp</a>
        <a class="back" href="https://iniziopizzaiolo.com/taller/">← Volver al taller</a>
    </div>
</body>
</html>
